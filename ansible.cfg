[defaults]
# The profile_tasks per-task timing callback (cost attribution for the base and
# finalize playbook runs) is deliberately NOT enabled here. It lives in the
# ansible.posix collection, not ansible-core, and the default Lima dependency
# script installs only ansible-core — so enabling it unconditionally made every
# default base build print two harmless-but-alarming warnings on a plugin that
# could never load:
#   [WARNING]: Error loading plugin 'ansible.posix.profile_tasks': ...
#   [WARNING]: Skipping callback plugin 'profile_tasks', unable to load
# End users read those as a broken build. Instead the opt-in profiling mode
# (SAND_PROFILE=1) both installs ansible.posix on demand AND enables the
# callback via ANSIBLE_CALLBACKS_ENABLED for that run only (see
# profileGuestScript in internal/provision/provision.go). The default path
# stays collection-free and warning-free.

# roles/ is Ansible's implicit default (relative to this file's directory)
# and stays first, so every existing role resolves exactly as before.
# shipped-profiles/roles/ is added on top: it holds the Ansible role content
# backing the shipped provisioning profiles (see shipped-profiles/<tool>/profile.yml),
# reorganized out of roles/base and roles/claude-code so that content is
# reusable per-clone by the finalize-stage repo-profile reconciliation
# (strikethroo plan 18) without duplicating it. Role NAMES referenced from
# site.yml (e.g. `role: claude-code`) are unchanged, so this is purely a
# search-path addition, not a behavior change.
roles_path = roles:shipped-profiles/roles

[ssh_connection]
ssh_args = -o StrictHostKeyChecking=accept-new
