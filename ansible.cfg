[defaults]
# Per-task timing profile, printed at the end of the playbook run. Enables
# cost attribution for the base-phase and finalize-phase playbook runs (see
# strikethroo plan 13, task 01). callback_whitelist is the pre-2.10 spelling
# of the same setting; setting both is harmless since unknown keys are
# ignored by whichever Ansible version is installed. This works fine under
# --connection=local — callback plugins are independent of the connection
# plugin.
callbacks_enabled = profile_tasks
callback_whitelist = profile_tasks

[ssh_connection]
ssh_args = -o StrictHostKeyChecking=accept-new
