[defaults]
# Per-task timing profile, printed at the end of the playbook run. Enables
# cost attribution for the base-phase and finalize-phase playbook runs (see
# strikethroo plan 13, task 01). callback_whitelist is the pre-2.10 spelling
# of the same setting; setting both is harmless since unknown keys are
# ignored by whichever Ansible version is installed. This works fine under
# --connection=local — callback plugins are independent of the connection
# plugin.
#
# profile_tasks lives in the ansible.posix collection, not ansible-core (see
# strikethroo plan 13, task 02), and the default Lima dependency script
# installs only ansible-core. Leaving this enabled unconditionally is safe:
# a missing callback plugin makes Ansible print
#   [WARNING]: Error loading plugin 'ansible.posix.profile_tasks': ...
#   [WARNING]: Skipping callback plugin 'profile_tasks', unable to load
# and continue the run with the default stdout callback (verified against
# ansible-core 2.19 with ansible.posix absent) — it never hard-fails. The
# opt-in profiling mode (SAND_PROFILE=1) installs ansible.posix on demand so
# the callback actually loads and prints timing.
callbacks_enabled = profile_tasks
callback_whitelist = profile_tasks

[ssh_connection]
ssh_args = -o StrictHostKeyChecking=accept-new
