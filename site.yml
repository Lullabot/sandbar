---
- name: Provision Claude Code development VM
  hosts: all
  become: true
  # provision_phase splits the run so a generic "base" VM can be built once and
  # cloned cheaply:
  #   full     - everything in one pass (default; the non-clone / curl|bash flow)
  #   base     - heavy, identity-free setup baked into the clone source
  #   finalize - light per-clone work (hostname, git identity, repo). No apt
  #              upgrade: that is paid once on the base by its 30-day
  #              self-refresh (base_apt_upgrade), not re-paid by every clone.
  # Tasks gate on this with `when:`; fact-gathering stays ungated so both phases
  # see it. dev-tools/claude-code are heavy (skip in finalize); project is
  # per-clone (skip in base).
  roles:
    - base
    - user
    # Samba is for non-Lima / remote-host deployments. The Lima flow sets
    # samba_enabled=false (use a bind mount or `limactl copy` instead).
    - role: samba
      when:
        - samba_enabled | default(true) | bool
        - provision_phase | default('full') != 'finalize'
    - role: dev-tools
      when: provision_phase | default('full') != 'finalize'
    # Claude Code is part of the configurable base tool-set (sand create
    # --with-claude), not a fixture of the image: a user can de-select it and
    # install their own agent instead.
    - role: claude-code
      when:
        - toolset_claude | default(true) | bool
        - provision_phase | default('full') != 'finalize'
    # OpenAI Codex is also part of the configurable base tool-set (sand create
    # --with-codex), but unlike its opt-out siblings above it is opt-in:
    # toolset_codex defaults to false, so an unconfigured run does not install
    # it.
    - role: codex
      when:
        - toolset_codex | default(false) | bool
        - provision_phase | default('full') != 'finalize'
    - role: project
      when: provision_phase | default('full') != 'base'
    # Repo-checked-in provisioning profile (.sandbar/), applied per-clone after
    # the project clone. Runs in the same phases as `project` (it needs the
    # checkout) and only when a repo was actually cloned. Everything the stage
    # does is further gated INSIDE the role on the manifest being present, so a
    # repo without .sandbar/ executes only a stat and introduces no new
    # variables. See roles/repo-profile/tasks/main.yml for why it never touches
    # the shared base image, its version stamp, or the embedded playbook fileset.
    - role: repo-profile
      when:
        - provision_phase | default('full') != 'base'
        - project_clone_url | default('') | length > 0
