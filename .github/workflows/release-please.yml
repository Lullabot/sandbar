name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-24.04
    steps:
      # A GitHub App token (not the default GITHUB_TOKEN) is required here on
      # purpose: release-please creates the release commit and the `v*` tag, and
      # that tag is what triggers the `release` workflow (GoReleaser). Events
      # made with GITHUB_TOKEN deliberately do NOT trigger other workflows, so a
      # GITHUB_TOKEN-created tag would leave the binaries + Homebrew formula
      # unbuilt. The token is minted per-run and expires in ~1h. Reuses the
      # org's release-please App (install it on this repo with contents:write +
      # pull-requests:write).
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
