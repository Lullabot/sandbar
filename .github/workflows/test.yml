name: test

# Two jobs:
#   * lint     — fast, no VM: ansible syntax check. Runs on every push so most
#                mistakes fail in ~30s.
#   * lima-e2e — the real thing: build `sand` from the checkout and run it
#                end to end on a Lima VM. GitHub's hosted ubuntu runners expose
#                /dev/kvm (nested virt for Linux guests), so Lima runs under
#                QEMU+KVM here — this is the only place the Lima orchestration
#                (base build, `limactl clone`, finalize) can be exercised.
#                macOS runners lack nested virt, so the Mac `vz` driver is
#                intentionally not covered; the driver is Lima's concern, not
#                this repo's.

# push only on main (post-merge); feature branches run once via pull_request,
# not twice from a matching push event.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  # Heavy, advisory jobs (mutation, molecule) run weekly, not per-PR, so the
  # fast unit gate is the only thing that blocks merges. See the `if:` guards
  # on the `mutation` and `molecule` jobs below.
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Ansible syntax check
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
          ansible-playbook -i localhost, --connection=local site.yml --syntax-check

  unit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      # Unit and integration tests, including the teatest golden snapshots of
      # the TUI. These need no VM (the lima client is faked), so they run here
      # rather than in the slow lima-e2e job. The `limae2e`-tagged tests that
      # boot real VMs stay gated and run only in lima-e2e below.
      #
      # -race: the last two release cycles were race fixes; the suite is
      # -race-clean and CI must enforce it. -covermode=atomic is required under
      # -race. Coverage is measured over ./internal/... only (the cmd/sand main
      # glue is excluded so it doesn't distort the number) and gated against a
      # repo-committed floor — self-contained, no third-party coverage service.
      # Bump COVERAGE_FLOOR by hand in a PR as coverage rises.
      - name: Go tests (race) + coverage gate
        env:
          COVERAGE_FLOOR: "87"
        run: |
          go test ./... -race -covermode=atomic \
            -coverpkg=./internal/... -coverprofile=coverage.out
          go tool cover -html=coverage.out -o coverage.html
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print substr($3, 1, length($3)-1)}')
          awk -v t="$total" -v f="$COVERAGE_FLOOR" 'BEGIN {
            if (t+0 < f+0) { printf "::error::coverage %.1f%% is below the floor %s%%\n", t, f; exit 1 }
            printf "coverage %.1f%% >= floor %s%%\n", t, f
          }'

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage
          path: |
            coverage.out
            coverage.html

  lima-e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 60 # +15 for the cmd/sand limae2e create/recreate tests
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      # `limactl clone` copies the provisioned qcow2 (the runner's ext4 isn't
      # copy-on-write), so base + clone roughly double the disk footprint.
      # Reclaim the preinstalled toolchains we don't use to avoid disk-full.
      - name: Free up runner disk
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/powershell /usr/share/swift || true
          df -h /

      - name: Set up Lima (installs QEMU, configures KVM + SSH)
        id: lima
        uses: lima-vm/lima-actions/setup@55627e31b78637bf254a8b2a14da8ea7d12564e5 # v1

      # Cache the downloaded Debian cloud image across runs so repeat builds
      # don't re-download it. Keyed on the Lima version from the setup step;
      # restore-keys lets a Lima version bump reuse the previous cache (the
      # Debian image choice is not tied to the Lima version) instead of
      # re-downloading the image cold.
      - name: Cache Lima image downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/lima
          key: lima-${{ steps.lima.outputs.version }}
          restore-keys: |
            lima-

      # Persist sand's host-side apt-archives cache across runs. buildBase
      # seeds the guest's /var/cache/apt/archives from this directory before
      # the base playbook runs and harvests it back afterwards (see
      # internal/provision/aptcache.go), so with a restored cache the cold
      # `--rebuild` build below — and the minimal base the cmd/sand limae2e
      # tests build — is CPU-bound (unpack/configure) instead of re-downloading
      # every .deb from Debian/NodeSource/Docker/etc. on each run. Keyed on the
      # playbook content so a playbook change saves the freshly harvested set;
      # restore-keys makes any older cache a useful partial hit (apt fetches
      # only what is missing or has a newer version upstream).
      - name: Cache apt packages fetched during base builds
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/sand/apt-cache
          key: sand-apt-${{ hashFiles('site.yml', 'roles/**', 'group_vars/**') }}
          restore-keys: |
            sand-apt-

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: go.mod

      - name: Build sand from the checkout
        run: go build -o sand ./cmd/sand

      # The cmd/sand limae2e tests build their own minimal base
      # (sand-cmde2e-base, all tool flags off) and tear it and their tiny
      # clones down in TestMain/Cleanup, so they run FIRST — on maximum free
      # disk — and reclaim everything before the heavy claude-ci provision
      # below. They assert the headless create records a managed VM and that
      # the --recreate managed-gate holds against a real registry.
      - name: cmd/sand end-to-end (headless create + --recreate gate)
        run: LIMA_E2E=1 go test -tags limae2e -timeout 30m -run E2E ./cmd/sand/

      # Run the actual entrypoint, non-interactively, forcing a true
      # from-scratch base build with --rebuild. Base reuse/re-apply is the
      # default path now (a stale base converges in place rather than
      # rebuilding — see internal/provision/provision.go), so the cold build
      # must be requested explicitly to be exercised by intent rather than
      # merely because this runner happens to start with no base image.
      # This builds the base image, clones it to `claude-ci`, finalizes, and
      # restarts — the full path that can't run inside the nested-virt-less
      # dev VM. Modest resources to fit the hosted runner (4 vCPU / 16 GB).
      - name: Create a VM (cold — force a from-scratch base build)
        run: |
          # pipefail, or `| tee` swallows the exit status and a failed provision
          # sails past this step (GitHub's default shell is `bash -e`, not `-eo
          # pipefail`). The whole point of this job is to go red when the base
          # build breaks; without this it goes red later, somewhere confusing.
          set -o pipefail
          ./sand create --rebuild \
            --name claude-ci \
            --git-name "CI Bot" --git-email ci@example.com \
            --cpus 2 --memory 6GiB --disk 30GiB 2>&1 | tee cold.log

      # The reason this branch exists: keyrings created by `gpg --dearmor`
      # (ddev.gpg, nodesource.gpg) obey the provisioning shell's umask. A global
      # umask 077 left them root-only, so the _apt sandbox user (uid 42) could
      # not read them and signature verification broke. Assert every keyring is
      # readable as _apt, then prove `apt-get update` verifies cleanly.
      - name: Assert apt keyrings are readable by the _apt sandbox user
        run: |
          limactl shell claude-ci sudo bash -euo pipefail -c '
            shopt -s nullglob
            fail=0
            for f in /etc/apt/keyrings/*; do
              if ! sudo -u _apt test -r "$f"; then
                echo "::error::keyring not readable by _apt: $f"
                ls -l "$f"
                fail=1
              fi
            done
            exit $fail
          '

      - name: Assert apt update verifies signatures cleanly
        run: limactl shell claude-ci sudo apt-get update

      # Without linger, logind stops user@<uid>.service ten seconds after the
      # last session for the user closes, killing any detached tmux server and
      # the long-running Claude Code session inside it.
      - name: Assert systemd linger is enabled for the VM user
        run: |
          limactl shell claude-ci bash -lc '
            set -e
            loginctl show-user "$(id -un)" --property=Linger | grep -qx "Linger=yes"
          '

      - name: Smoke-test the installed toolchain
        run: |
          limactl shell claude-ci bash -lc '
            set -e
            docker --version
            gh --version
            node --version
          '

      # Free the clone's disk before the second create — the BASE (sandbar-base)
      # is a separate `limactl clone` source and is untouched by deleting a
      # clone taken from it. This is what keeps a second qcow2 within budget:
      # base + one clone at a time, same footprint as before this task, rather
      # than base + two clones at once.
      - name: Delete the cold clone (base image survives — it must, for reuse below)
        run: limactl delete -f claude-ci

      # Change the playbook's actual byte content (a `touch` would not move the
      # content hash that decides staleness — see baseversion.go's
      # playbookContentHash) so the second create below hits the re-apply
      # branch instead of silently reusing the base as-is. This proves the
      # in-place re-apply path specifically, not just "no error occurred".
      - name: Dirty the playbook so the next create re-applies it in place
        run: |
          echo '# ci - force a re-apply for the lima-e2e warm-path assertion' >> roles/base/tasks/main.yml

      # Second create: same base name (fixed as "sandbar-base" — see
      # vm.DefaultCreateConfig), no --rebuild. The base already exists, so this
      # must take the in-place re-apply branch of ensureBaseStopped, not the
      # cold-build branch.
      - name: Create a second VM (warm — must re-apply the base in place, not rebuild it)
        run: |
          # See the cold create above: `| tee` without pipefail hides a failure.
          set -o pipefail
          ./sand create \
            --name claude-ci-warm \
            --git-name "CI Bot" --git-email ci@example.com \
            --cpus 2 --memory 6GiB --disk 30GiB 2>&1 | tee warm.log

      # Assert the warm create took the re-apply branch (provision.go:522,
      # "Re-applying the playbook to base image ... Ansible is idempotent") and
      # never the from-scratch branches (provision.go:196 "Building base
      # image...", provision.go:406/443/469 "Rebuilding base image .../
      # ...rebuilding it from scratch..."). A from-scratch branch means the
      # base was deleted and rebuilt (re-downloading Debian) instead of
      # converged in place.
      - name: Assert the base was re-applied, not rebuilt from scratch
        run: |
          if grep -qE 'Building base image|Rebuilding base image|rebuilding it from scratch' warm.log; then
            echo "::error::the warm create rebuilt the base from scratch instead of re-applying it in place"
            exit 1
          fi
          if ! grep -qF 'Re-applying the playbook to base image' warm.log; then
            echo "::error::the warm create did not show the expected re-apply banner"
            exit 1
          fi

      # On failure, surface the captured `sand create` output for debugging.
      # (Provisioning is not logged inside the guest — it streams to sand's
      # own stdout, which is what cold.log/warm.log captured above.)
      - name: Dump provisioning logs on failure
        if: failure()
        run: |
          tail -n 200 cold.log || true
          tail -n 200 warm.log || true

  # Remote-Lima-over-SSH, end to end, on a single runner: the "remote" is this
  # same machine reached over REAL ssh as a SECOND local user (sand-remote-e2e).
  # That second account owns its own $HOME and therefore its own ~/.lima — the
  # separation internal/provider/remote_e2e_test.go's doc calls out as what
  # makes a loopback target meaningful (the local/remote isolation assertions
  # compare two genuinely different Lima homes). This exercises the SSHHost
  # transport for real — ssh argv + quoting, remote limactl on the
  # non-interactive PATH, HostFiles over ssh, remote base build — without
  # needing a second machine.
  remote-lima-e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      # Same disk pressure as lima-e2e: the remote user builds its own base
      # image under ~sand-remote-e2e/.lima.
      - name: Free up runner disk
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/powershell /usr/share/swift || true
          df -h /

      - name: Set up Lima (installs QEMU, configures KVM + SSH)
        id: lima
        uses: lima-vm/lima-actions/setup@55627e31b78637bf254a8b2a14da8ea7d12564e5 # v1

      - name: Cache Lima image downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/lima
          key: lima-${{ steps.lima.outputs.version }}

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: go.mod

      - name: Create the loopback "remote" user with passwordless ssh
        run: |
          sudo useradd -m -s /bin/bash sand-remote-e2e
          # QEMU under the second user needs /dev/kvm; lima-actions grants it
          # via the kvm group.
          sudo usermod -aG kvm sand-remote-e2e
          ssh-keygen -t ed25519 -N "" -f "$HOME/.ssh/remote_e2e"
          sudo install -d -m 700 -o sand-remote-e2e -g sand-remote-e2e /home/sand-remote-e2e/.ssh
          sudo install -m 600 -o sand-remote-e2e -g sand-remote-e2e \
            "$HOME/.ssh/remote_e2e.pub" /home/sand-remote-e2e/.ssh/authorized_keys
          sudo systemctl start ssh
          ssh-keyscan -H localhost >> "$HOME/.ssh/known_hosts"
          # The GitHub runner image writes XDG_CONFIG_HOME=/home/runner/.config
          # into /etc/environment, and pam_env injects /etc/environment into
          # EVERY new session — including this loopback ssh login as the second
          # user. The remote limactl then resolves its autostart unit under
          # /home/runner (another user's home) and dies with EACCES. Strip the
          # XDG_* lines: only new PAM sessions read the file, so the runner
          # user's already-running processes keep their env untouched.
          sudo sed -i '/^XDG_/d' /etc/environment
          # The transport runs `ssh … limactl …` on the remote's default
          # non-interactive PATH — prove that resolves (and that the XDG leak
          # is really gone) before the long test.
          ssh -i "$HOME/.ssh/remote_e2e" sand-remote-e2e@localhost limactl --version
          leaked=$(ssh -i "$HOME/.ssh/remote_e2e" sand-remote-e2e@localhost 'printenv XDG_CONFIG_HOME || true')
          if [ -n "$leaked" ]; then
            echo "::error::XDG_CONFIG_HOME still leaks into the remote session: $leaked"
            exit 1
          fi
          # QEMU without KVM silently falls back to TCG and a Debian boot blows
          # straight past Lima's 10-minute ssh wait — fail fast and say why
          # instead. (The runner image ships /dev/kvm world-accessible; this
          # guards the second user against that ever changing.)
          ls -l /dev/kvm
          ssh -i "$HOME/.ssh/remote_e2e" sand-remote-e2e@localhost \
            'test -r /dev/kvm -a -w /dev/kvm && echo "kvm OK"' \
            || { echo "::error::sand-remote-e2e cannot open /dev/kvm — QEMU would fall back to TCG"; exit 1; }
          # Pre-create Lima's guest-ssh keypair with tight permissions. Left to
          # limactl inside this non-interactive session, ~/.lima/_config/user
          # came out group/world-readable — the hostagent's ssh then IGNORES it
          # ("UNPROTECTED PRIVATE KEY FILE"), guest publickey auth can never
          # succeed, and the boot "times out" ten minutes later with no hint.
          # ssh-keygen always chmods the private key to 600, and Lima adopts an
          # existing _config/user instead of regenerating it.
          sudo -u sand-remote-e2e -H bash -c '
            umask 077
            mkdir -p ~/.lima/_config
            [ -f ~/.lima/_config/user ] || ssh-keygen -q -t ed25519 -N "" -f ~/.lima/_config/user
            chmod 600 ~/.lima/_config/user'
          perms=$(sudo stat -c %a /home/sand-remote-e2e/.lima/_config/user)
          [ "$perms" = "600" ] || { echo "::error::Lima user key has mode $perms, want 600"; exit 1; }

      # The remote user downloads its own Debian image into its own
      # ~/.cache/lima; seed it from the runner user's restored cache so a warm
      # cache saves the download on both sides.
      - name: Share the cached image download with the remote user
        run: |
          if [ -d "$HOME/.cache/lima" ]; then
            sudo mkdir -p /home/sand-remote-e2e/.cache
            sudo cp -a "$HOME/.cache/lima" /home/sand-remote-e2e/.cache/lima
            sudo chown -R sand-remote-e2e:sand-remote-e2e /home/sand-remote-e2e/.cache
          fi

      # The suite skips cleanly unless LIMA_REMOTE_E2E=1 and a reachable
      # target are configured — here they are, so it runs for real: create on
      # the remote, managed/remote-scope claim, attach argv, copy round-trip,
      # list/stop/delete, and the local-vs-remote isolation assertions.
      #
      # The snapshot loop exists because a FAILED create cleans up its partial
      # VM (instance dir, serial logs and all) before the test returns — the
      # one artifact that says why a guest never booted is deleted with it. A
      # 15s rsync into /tmp keeps the latest copy for the failure dump below.
      # Runs every real-ssh provider E2E (-run TestE2E): the remote-Lima
      # lifecycle test AND the provenance tests — cross-mode / two-controller
      # convergence, the "a locally-created VM is visible to a remote client"
      # proof, and in-flight (Provisioning) marker visibility (plan 17). The
      # provenance tests use fixture instance dirs rather than a VM boot, so
      # they add negligible time to this job.
      - name: Remote-Lima E2E over loopback ssh
        run: |
          ( while true; do
              sudo rsync -a --delete /home/sand-remote-e2e/.lima/ /tmp/lima-snap/ 2>/dev/null || true
              sleep 15
            done ) &
          SNAP_PID=$!
          rc=0
          LIMA_REMOTE_E2E=1 \
          LIMA_REMOTE_E2E_HOST=localhost \
          LIMA_REMOTE_E2E_USER=sand-remote-e2e \
          LIMA_REMOTE_E2E_IDENTITY="$HOME/.ssh/remote_e2e" \
            go test -tags limae2e -timeout 45m -run TestE2E -v ./internal/provider/ || rc=$?
          kill "$SNAP_PID" 2>/dev/null || true
          exit "$rc"

      - name: Dump the remote guest's boot logs on failure
        if: failure()
        run: |
          echo "=== snapshot of ~sand-remote-e2e/.lima (latest 15s copy) ==="
          sudo find /tmp/lima-snap -maxdepth 2 -type f | head -50 || true
          # The snapshot preserves sand-remote-e2e's ownership and 0700 dirs
          # (rsync -a), so the GLOB itself needs root — an unprivileged glob
          # fails to expand and this loop silently prints nothing, which is
          # exactly what happened the first time this step ran.
          sudo bash -c '
            for f in /tmp/lima-snap/*/serial*.log /tmp/lima-snap/*/ha.std*.log; do
              [ -f "$f" ] || continue
              echo "===== tail -n 120 $f ====="
              tail -n 120 "$f" || true
            done'

  # Mutation testing measures how good the tests are, not just which lines they
  # touch. It recompiles and reruns the suite per mutant, so it is slow — it
  # runs weekly (schedule) and on demand (workflow_dispatch), never per-PR, and
  # is advisory (non-blocking). Scoped to the logic-heavy core packages; the ui
  # view layer is excluded (mutating it against goldens yields mostly
  # equivalent/timeout mutants for little signal).
  mutation:
    runs-on: ubuntu-24.04
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    continue-on-error: true # advisory: never blocks a merge
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: go.mod

      - name: Install gremlins
        run: go install github.com/go-gremlins/gremlins/cmd/gremlins@v0.5.0

      - name: Run gremlins (core packages, advisory)
        run: |
          : > mutation.log
          for pkg in provision registry vm lima; do
            echo "=== gremlins: internal/$pkg ===" | tee -a mutation.log
            # --config carries advisory thresholds (0 = never fail); the job is
            # continue-on-error anyway. Scope by path so ui and other packages
            # are excluded from the initial core set.
            gremlins unleash --config .gremlins.yaml "./internal/$pkg/..." 2>&1 | tee -a mutation.log || true
          done

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mutation-report
          path: mutation.log

  # Ansible role behaviour, not just YAML validity: molecule converges each role
  # in a systemd-capable Debian container (so services actually start), re-runs
  # for idempotence, and verifies concrete outcomes. Scoped to base + samba;
  # the other roles are documented as follow-up. Weekly + on demand, not per-PR.
  molecule:
    # No custom `name:` — GitHub derives `molecule (base)` / `molecule (samba)`
    # from the matrix when the job runs, and shows a single clean `molecule`
    # check when it is skipped on a PR. An explicit templated name would render
    # the raw `${{ matrix.scenario }}` on skipped runs (matrix never expands).
    runs-on: ubuntu-24.04
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    # Advisory: KNOWN idempotence failure on the samba scenario — roles/samba's
    # "Set Samba password" task is unconditionally changed_when: true (smbpasswd
    # has no idempotent check), so `molecule test -s samba` reports one changed
    # task on the idempotence re-run. Fixing that means editing the production
    # role, which is out of scope for this test/CI-only work — tracked as a
    # follow-up. continue-on-error keeps the scheduled run informative (read the
    # logs) rather than permanently red on a known production-role property.
    continue-on-error: true
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        scenario: [base, samba]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.14"

      - name: Install molecule + Docker driver
        run: pip install "molecule>=6" "molecule-plugins[docker]" ansible-core

      - name: molecule test (${{ matrix.scenario }})
        run: molecule test -s ${{ matrix.scenario }}
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
