# Release workflow: on a `v*` tag push, GoReleaser cross-compiles `sand` for
# darwin/linux x amd64/arm64, uploads the archives to the GitHub Release, and
# updates the Homebrew formula in the `lullabot/homebrew-sandbar` tap.
#
# Tags are created by release-please (see release-please.yml), not by hand:
# merging its release PR creates the `vX.Y.Z` tag + a *draft* GitHub Release, and
# — because release-please tags with a GitHub App token — that tag push triggers
# this workflow. GoReleaser adopts that draft (`use_existing_draft` +
# `mode: keep-existing`), uploads the binaries into it without touching its
# notes, and publishes it at the end.
#
# The release must still be a draft when GoReleaser reaches it: this repository
# has GitHub's immutable releases turned on, and a published release can never
# gain another asset (that is the `422 Cannot upload assets to an immutable
# release` that broke the v0.1.0 run).
#
# Human prerequisites (one-time, performed by a release maintainer, NOT by
# this workflow):
#   1. Create the empty `lullabot/homebrew-sandbar` GitHub repository (this is
#      the Homebrew tap GoReleaser's `brews:` publisher pushes formula updates
#      to).
#   2. Create a dedicated GitHub App (org-owned) with Contents:write, installed
#      only on `lullabot/homebrew-sandbar`. Store its App ID as the
#      `HOMEBREW_TAP_APP_ID` Actions variable and its private key as the
#      `HOMEBREW_TAP_APP_PRIVATE_KEY` secret on this repo; the job mints a
#      short-lived, tap-scoped token from them at runtime.
name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      # Mint a short-lived (~1h) token scoped to the tap repo so GoReleaser's
      # `brews:` publisher can push the formula there. Replaces a long-lived PAT:
      # the dedicated App is installed only on homebrew-sandbar with
      # contents:write, so this workflow's cross-repo reach is exactly that.
      - uses: actions/create-github-app-token@v3
        id: tap-token
        with:
          app-id: ${{ vars.HOMEBREW_TAP_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: homebrew-sandbar
      # release-please pushes the tag just before it creates the draft release,
      # so this workflow can start while the draft does not exist yet. Wait for
      # it rather than racing: with no draft to adopt, GoReleaser would create a
      # release of its own and publish it, and an immutable published release
      # cannot be deleted without burning that version number for good.
      - name: Wait for release-please's draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          for _ in $(seq 1 30); do
            if gh api "repos/$GITHUB_REPOSITORY/releases" \
                --jq ".[] | select(.draft and .tag_name == \"$TAG\") | .id" | grep -q .; then
              echo "Draft release for $TAG found."
              exit 0
            fi
            echo "No draft release for $TAG yet; retrying in 5s."
            sleep 5
          done
          echo "::error::No draft release for $TAG after 150s. Refusing to run GoReleaser: it would publish a new release and burn the tag."
          exit 1
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --clean
        env:
          # The GitHub Release in THIS repo uses the default token; only the
          # cross-repo formula push uses the App token.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ steps.tap-token.outputs.token }}
