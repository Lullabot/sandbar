---
- name: Get home directory for {{ user_name }}
  ansible.builtin.getent:
    database: passwd
    key: "{{ user_name }}"

- name: Set user home directory fact
  ansible.builtin.set_fact:
    user_home: "{{ ansible_facts.getent_passwd[user_name][4] }}"

- name: Create ~/.claude directory
  ansible.builtin.file:
    path: "{{ user_home }}/.claude"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"

# The SessionStart/CwdChanged hooks in the template load direnv's exports
# (scoped .env secrets, see roles/project and docs/using-sand/secrets.md)
# into every Claude Code session. Without them only interactive shells get
# the scoped secrets: direnv's bash hook rides on PROMPT_COMMAND, which
# never fires in Claude Code's non-interactive Bash tool — and sessions
# dispatched from `claude agents` additionally inherit the environment of
# wherever the supervisor was started, not the repo they work in. The hook's
# `2>/dev/null || true` keeps a working directory whose .env was never
# `direnv allow`ed (direnv exits non-zero there) from surfacing as a failing
# hook on every cwd change; that directory just loads no scoped secret.
- name: Deploy ~/.claude/settings.json from template
  ansible.builtin.template:
    src: claude-settings.json.j2
    dest: "{{ user_home }}/.claude/settings.json"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"

# Claude Code only honors --dangerously-skip-permissions after its first-run
# onboarding has completed: with a fresh ~/.claude.json the very first
# interactive session runs the theme/login wizard and comes up WITHOUT bypass
# permissions until the user quits and relaunches
# (anthropics/claude-code#25503, #52501). Seeding hasCompletedOnboarding makes
# the first launch start in bypass mode immediately; the user still runs
# /login in-session. create-only (force: false) so a re-provision never
# clobbers a real config holding the OAuth account.
- name: Seed ~/.claude.json so the first launch honors bypass permissions
  ansible.builtin.copy:
    content: |
      {"hasCompletedOnboarding": true}
    dest: "{{ user_home }}/.claude.json"
    force: false
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0600"

- name: Install Claude Code using the official installer
  ansible.builtin.shell:
    cmd: set -o pipefail && curl -fsSL https://claude.ai/install.sh | bash
    executable: /bin/bash
  become: true
  become_user: "{{ user_name }}"
  args:
    creates: "{{ user_home }}/.local/bin/claude"

- name: Add ~/.local/bin to PATH in ~/.bashrc
  ansible.builtin.lineinfile:
    path: "{{ user_home }}/.bashrc"
    line: 'export PATH="$HOME/.local/bin:$PATH"'
    regexp: '(^|^export )PATH=.*\.local/bin'
    create: true
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"

# Guest clipboard shims for the sand paste-image feature:
#
# The headless guest has no display server and no real xclip/wl-paste, so
# Claude Code's native Ctrl-V paste probe finds nothing to talk to. These
# lightweight shell-script shims answer the exact probes Claude Code issues:
# they advertise "image/png" if the single-slot file exists, stream the file
# on image-format requests, and behave as an empty clipboard otherwise.
#
# The shims serve a single sand-managed PNG (~/.sand/clip/latest.png),
# written at runtime by the host-side `sand paste-image` command or TUI verb.
# The file persists until replaced (never consumed/cleared on read), so
# Ctrl-V can be pressed multiple times after a single paste. Installed to
# /usr/local/bin on the guest PATH with no risk of shadowing a real tool
# (the guest has no X server or Wayland and no real clipboard tools).
#
# Image-only by construction: the shims have no -i/--write path, no
# text/plain branch, and no non-image-target case — they refuse any request
# that is not for an image type, independent of the host-side read seam.
# This is a load-bearing security property (see AGENTS.md "IMAGE-ONLY
# invariant").
- name: Install sand image-only xclip clipboard shim
  ansible.builtin.copy:
    src: sand-xclip
    dest: /usr/local/bin/xclip
    owner: root
    group: root
    mode: "0755"

- name: Install sand image-only wl-paste clipboard shim
  ansible.builtin.copy:
    src: sand-wl-paste
    dest: /usr/local/bin/wl-paste
    owner: root
    group: root
    mode: "0755"
