---
- name: Set up the initial project clone
  when: project_clone_url | length > 0
  block:
    - name: Get home directory for {{ user_name }}
      ansible.builtin.getent:
        database: passwd
        key: "{{ user_name }}"

    - name: Set home directory fact
      ansible.builtin.set_fact:
        user_home: "{{ ansible_facts.getent_passwd[user_name][4] }}"

    # Turn https://github.com/org/repo(.git) into host=github.com,
    # relpath=org/repo, so the checkout mirrors the URL under ~/<host>/. Strip any
    # trailing slash(es) before .git: a URL like .../org/repo/ would otherwise
    # leave relpath="org/repo/", whose dirname is "org/repo" — collapsing the org
    # directory onto the clone destination so "Create the org directory" creates
    # the exact path git clone then refuses ("destination path already exists").
    - name: Parse the clone URL
      ansible.builtin.set_fact:
        _clone_host: "{{ project_clone_url | regex_replace('^[a-zA-Z]+://', '') | regex_replace('/.*$', '') }}"
        _clone_relpath: "{{ project_clone_url | regex_replace('^[a-zA-Z]+://[^/]+/', '') | regex_replace('/+$', '') | regex_replace('\\.git$', '') }}"

    - name: Derive the org directory and clone destination
      ansible.builtin.set_fact:
        _clone_org_dir: "{{ user_home }}/{{ _clone_host }}/{{ _clone_relpath | dirname }}"
        _clone_dest: "{{ user_home }}/{{ _clone_host }}/{{ _clone_relpath }}"

    - name: Create the org directory
      ansible.builtin.file:
        path: "{{ _clone_org_dir }}"
        state: directory
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: "0755"

    # Authentication for a private GitHub clone comes from the secrets role's
    # file-backed git credential store (roles/secrets), not from a var passed
    # here: `sand create --clone-token` records the token as a github-scoped
    # secret in the host store (see internal/provision.RecordCloneTokenSecret),
    # and site.yml runs the secrets role BEFORE this one so the credential
    # (and its includeIf ~/.gitconfig stanza) already exists when the clone
    # below runs.
    - name: Clone the project
      ansible.builtin.git:
        repo: "{{ project_clone_url }}"
        dest: "{{ _clone_dest }}"
        update: false
      become: true
      become_user: "{{ user_name }}"
      environment:
        HOME: "{{ user_home }}"
        GIT_TERMINAL_PROMPT: "0"
