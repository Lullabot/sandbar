base_hostname: claude
base_domain: lan
base_locale: en_CA.UTF-8
base_nodejs_major_version: 24
# Installed alongside base_packages in the single consolidated apt transaction
# (roles/base/tasks/main.yml, "Install every base-phase package").
base_nodejs_packages:
  - nodejs
# The base-phase apt transaction runs with install_recommends: false (see
# roles/base/tasks/main.yml), so this list is the whole answer: a package that is
# not named here, and is not a hard dependency of one that is, does not reach the
# image. Adding something back is exactly this — name it here.
#
# build-essential and python3-dev are the ones that bite. gcc/g++/make/libc6-dev
# used to arrive only as RECOMMENDS of golang and the JDK, so switching
# recommends off silently removed the C toolchain — breaking node-gyp (any npm or
# npx package with a native module), cgo (`go build` defaults to CGO_ENABLED=1),
# and pip packages with C extensions. They are named here so the toolchain is a
# stated requirement of the image rather than a side effect of two optional tools
# that a user can de-select.
base_packages:
  - acl
  - bash-completion
  - bats
  - build-essential
  - ca-certificates
  - curl
  - direnv
  - git
  - gnupg
  - htop
  - jq
  - locales
  - lsof
  - mkcert
  - ncdu
  - ncurses-term
  - openssh-server
  - python3
  - python3-dev
  - python3-pip
  - qemu-guest-agent
  - rsync
  - screen
  - sudo
  - tmux
  - traceroute
  - unzip
  - vim
  - wget
  - yq

# Configurable base-image tool-set (sand create --with-claude/--with-codex/
# --with-ddev/--with-go/--with-java). Four of the five default true so an
# unconfigured `sand create` — and a bare `ansible-playbook site.yml` run with
# no extra-vars — installs everything base_packages used to include
# unconditionally. sand's own BuildExtraVars (internal/provision/vars.go)
# normally supplies these for the base phase from vm.CreateConfig; the
# defaults here are the fallback for a direct playbook run.
#
# toolset_claude gates the whole claude-code role from site.yml (it installs no
# apt packages, so it has nothing to fold into toolset_packages below). It lives
# here with its siblings rather than in the role it gates: role defaults are
# play-wide, and keeping one home for the selections is what stops them drifting
# apart.
#
# toolset_codex is the first opt-in selection: it defaults to false, so an
# unconfigured run does not install it. Like claude, it gates the whole codex
# role from site.yml and installs no apt packages, so it also has nothing to
# fold into toolset_packages below.
toolset_claude: true
toolset_codex: false
toolset_ddev: true
toolset_go: true
toolset_java: true

# golang and default-jdk-headless are ~500-700MB installed between them, so
# they are opt-out rather than unconditional entries in base_packages above.
# Folded into the single install transaction in roles/base/tasks/main.yml.
toolset_packages: >-
  {{ (['golang'] if toolset_go | bool else [])
   + (['default-jdk-headless'] if toolset_java | bool else []) }}
