base_hostname: claude
base_domain: lan
base_locale: en_CA.UTF-8
base_nodejs_major_version: 24
# Installed alongside base_packages in the single consolidated apt transaction
# (roles/base/tasks/main.yml, "Install every base-phase package").
base_nodejs_packages:
  - nodejs
base_packages:
  - acl
  - bash-completion
  - bats
  - ca-certificates
  - curl
  - direnv
  - git
  - gnupg
  - htop
  - jq
  - locales
  - lsof
  - mkcert
  - ncdu
  - ncurses-term
  - openssh-server
  - python3
  - python3-pip
  - qemu-guest-agent
  - rsync
  - screen
  - sudo
  - tmux
  - traceroute
  - unzip
  - vim
  - wget
  - yq

# Configurable base-image tool-set (sand create --with-claude/--with-ddev/
# --with-go/--with-java). All four default true so an unconfigured `sand create`
# — and a bare `ansible-playbook site.yml` run with no extra-vars — installs
# everything base_packages used to include unconditionally. sand's own
# BuildExtraVars (internal/provision/vars.go) normally supplies these for the
# base phase from vm.CreateConfig; the defaults here are the fallback for a
# direct playbook run.
#
# toolset_claude gates the whole claude-code role from site.yml (it installs no
# apt packages, so it has nothing to fold into toolset_packages below). It lives
# here with its siblings rather than in the role it gates: role defaults are
# play-wide, and keeping one home for the selections is what stops them drifting
# apart.
toolset_claude: true
toolset_ddev: true
toolset_go: true
toolset_java: true

# golang and default-jdk-headless are ~500-700MB installed between them, so
# they are opt-out rather than unconditional entries in base_packages above.
# Folded into the single install transaction in roles/base/tasks/main.yml.
toolset_packages: >-
  {{ (['golang'] if toolset_go | bool else [])
   + (['default-jdk-headless'] if toolset_java | bool else []) }}
