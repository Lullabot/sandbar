---
- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ base_hostname }}"

- name: Deploy /etc/hosts
  ansible.builtin.template:
    src: hosts.j2
    dest: /etc/hosts
    owner: root
    group: root
    mode: "0644"

# A base image can sit unused for weeks; when it is older than the 30-day
# threshold (internal/provision/provision.go's baseMaxAge), the create that
# notices starts it, runs this once, in place, under the base lock, and
# re-stamps it — so every clone taken from it afterwards is already current and
# skips this entirely. base_apt_upgrade is emitted ONLY for that self-refresh
# run (BuildExtraVars, aptUpgrade=true); a cold base build and a clone's
# finalize phase never set it, so they never pay for it here.
- name: Upgrade all apt packages
  ansible.builtin.apt:
    upgrade: dist
    update_cache: true
  register: _apt_upgrade
  until: _apt_upgrade is succeeded
  retries: 3
  delay: 5
  when: base_apt_upgrade | default(false) | bool

- name: Ensure the locale is enabled in /etc/locale.gen
  ansible.builtin.lineinfile:
    path: /etc/locale.gen
    regexp: '^#?\s*{{ base_locale }} UTF-8'
    line: "{{ base_locale }} UTF-8"
    state: present
  register: _locale_line
  when: provision_phase | default('full') != 'finalize'

# Deliberately NOT gated on `_locale_line.changed`. The line edit and the compile
# are two steps, and a run interrupted between them leaves the line present but no
# compiled locale — after which `changed` is forever false and the locale would
# never be generated, while /etc/default/locale below still names it. Every shell
# in the base and in every clone from it then falls back to C with a `setlocale`
# warning and nothing in the provisioning output says why. locale-gen is
# idempotent and cheap, so just run it.
- name: Generate the locale
  ansible.builtin.command: locale-gen
  when: provision_phase | default('full') != 'finalize'
  changed_when: _locale_line.changed

- name: Set default locale
  ansible.builtin.copy:
    dest: /etc/default/locale
    content: "LANG={{ base_locale }}\n"
    owner: root
    group: root
    mode: "0644"
  when: provision_phase | default('full') != 'finalize'

# --- dpkg/apt tuning, written before anything is installed so the very first
# install below already benefits. The doc/man exclusions and the language
# setting are safe and persist past the base phase; force-unsafe-io is
# removed near the end of this file, before the image becomes a clone source.
- name: Speed up dpkg for the base build (disposable builder — removed before cloning)
  ansible.builtin.copy:
    dest: /etc/dpkg/dpkg.cfg.d/99-sand-base-speed
    mode: "0644"
    content: |
      force-unsafe-io
  when: provision_phase | default('full') != 'finalize'

- name: Stop unpacking docs and man pages
  ansible.builtin.copy:
    dest: /etc/dpkg/dpkg.cfg.d/99-sand-nodoc
    mode: "0644"
    content: |
      path-exclude=/usr/share/doc/*
      path-include=/usr/share/doc/*/copyright
      path-exclude=/usr/share/man/*
  when: provision_phase | default('full') != 'finalize'

- name: Stop fetching translation indexes
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/99-sand-no-languages
    mode: "0644"
    content: |
      Acquire::Languages "none";
  when: provision_phase | default('full') != 'finalize'

# --- Register every third-party apt keyring and source below, before the
# single update+install pass further down. curl and gnupg are guaranteed
# present by the Lima dependency script, so all repos can be registered in
# this one playbook pass. Every keyring file below is mode 0644 so the _apt
# sandbox user (which apt drops privileges to for fetching) can read it. ---
- name: Ensure /etc/apt/keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when: provision_phase | default('full') != 'finalize'

# Node.js (NodeSource)
- name: Download NodeSource GPG key
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /tmp/nodesource.gpg.key
    mode: "0644"
  when: provision_phase | default('full') != 'finalize'

- name: Dearmor NodeSource GPG key
  ansible.builtin.command:
    cmd: gpg --batch --yes --dearmor -o /etc/apt/keyrings/nodesource.gpg /tmp/nodesource.gpg.key
  args:
    creates: /etc/apt/keyrings/nodesource.gpg
  when: provision_phase | default('full') != 'finalize'

- name: Make the NodeSource keyring readable by _apt
  ansible.builtin.file:
    path: /etc/apt/keyrings/nodesource.gpg
    mode: "0644" # MUST be readable by the _apt sandbox user
  when: provision_phase | default('full') != 'finalize'

- name: Remove temporary NodeSource GPG key file
  ansible.builtin.file:
    path: /tmp/nodesource.gpg.key
    state: absent
  when: provision_phase | default('full') != 'finalize'

- name: Deploy NodeSource APT repository
  ansible.builtin.copy:
    content: "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ base_nodejs_major_version }}.x nodistro main\n"
    dest: /etc/apt/sources.list.d/nodesource.list
    owner: root
    group: root
    mode: "0644"
  when: provision_phase | default('full') != 'finalize'

# Docker CE
- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644" # MUST be readable by the _apt sandbox user
  when: provision_phase | default('full') != 'finalize'

- name: Deploy Docker APT repository
  ansible.builtin.copy:
    content: |
      Types: deb
      URIs: https://download.docker.com/linux/debian
      Suites: trixie
      Components: stable
      Signed-By: /etc/apt/keyrings/docker.asc
    dest: /etc/apt/sources.list.d/docker.sources
    owner: root
    group: root
    mode: "0644"
  when: provision_phase | default('full') != 'finalize'

# ddev — part of the configurable base tool-set (sand create --with-ddev);
# registering this repo/keyring at all is pointless when the package won't be
# installed (see devtools_ddev_packages in roles/dev-tools/defaults/main.yml).
- name: Download ddev GPG key
  ansible.builtin.get_url:
    url: https://pkg.ddev.com/apt/gpg.key
    dest: /tmp/ddev-gpg.key
    mode: "0644"
  when:
    - provision_phase | default('full') != 'finalize'
    - toolset_ddev | bool

- name: Dearmor ddev GPG key
  ansible.builtin.command:
    cmd: gpg --batch --yes --dearmor -o /etc/apt/keyrings/ddev.gpg /tmp/ddev-gpg.key
  args:
    creates: /etc/apt/keyrings/ddev.gpg
  when:
    - provision_phase | default('full') != 'finalize'
    - toolset_ddev | bool

- name: Make the ddev keyring readable by _apt
  ansible.builtin.file:
    path: /etc/apt/keyrings/ddev.gpg
    mode: "0644" # MUST be readable by the _apt sandbox user
  when:
    - provision_phase | default('full') != 'finalize'
    - toolset_ddev | bool

- name: Remove temporary ddev GPG key file
  ansible.builtin.file:
    path: /tmp/ddev-gpg.key
    state: absent
  when:
    - provision_phase | default('full') != 'finalize'
    - toolset_ddev | bool

- name: Deploy ddev APT repository
  ansible.builtin.copy:
    content: "deb [signed-by=/etc/apt/keyrings/ddev.gpg] https://pkg.ddev.com/apt/ * *\n"
    dest: /etc/apt/sources.list.d/ddev.list
    owner: root
    group: root
    mode: "0644"
  when:
    - provision_phase | default('full') != 'finalize'
    - toolset_ddev | bool

# Cloudflared
- name: Download Cloudflare GPG key
  ansible.builtin.get_url:
    url: https://pkg.cloudflare.com/cloudflare-main.gpg
    dest: /etc/apt/keyrings/cloudflare.gpg
    mode: "0644" # MUST be readable by the _apt sandbox user
  when: provision_phase | default('full') != 'finalize'

- name: Deploy Cloudflare APT repository
  ansible.builtin.copy:
    content: "deb [signed-by=/etc/apt/keyrings/cloudflare.gpg] https://pkg.cloudflare.com/cloudflared any main\n"
    dest: /etc/apt/sources.list.d/cloudflare.list
    owner: root
    group: root
    mode: "0644"
  when: provision_phase | default('full') != 'finalize'

# GitHub CLI (gh)
- name: Download GitHub CLI GPG key
  ansible.builtin.get_url:
    url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
    dest: /etc/apt/keyrings/githubcli-archive-keyring.gpg
    mode: "0644" # MUST be readable by the _apt sandbox user
  when: provision_phase | default('full') != 'finalize'

- name: Deploy GitHub CLI APT repository
  ansible.builtin.copy:
    content: |
      Types: deb
      URIs: https://cli.github.com/packages
      Suites: stable
      Components: main
      Signed-By: /etc/apt/keyrings/githubcli-archive-keyring.gpg
    dest: /etc/apt/sources.list.d/github-cli.sources
    owner: root
    group: root
    mode: "0644"
  when: provision_phase | default('full') != 'finalize'

# --- One update, one install for the whole base phase. All repos above are
# registered before this point, so this is the only apt-get update and the
# only package install transaction the base phase performs. ---
- name: Refresh apt indexes (the only update in the base phase)
  ansible.builtin.apt:
    update_cache: true
  when: provision_phase | default('full') != 'finalize'

- name: Install every base-phase package in a single transaction
  ansible.builtin.apt:
    name: "{{ base_packages + base_nodejs_packages + devtools_docker_packages + devtools_packages + devtools_ddev_packages + toolset_packages }}"
    state: present
    update_cache: false # already refreshed above; keep false so a future edit can't silently reintroduce a second refresh
    # Recommends are OFF: the base installs what it asks for, and anything it
    # actually needs is NAMED in base_packages. Measured on the Debian-repo
    # subset of this transaction, recommends pulled 346 packages / 362MB of
    # downloads versus 264 / 340MB with them off and the toolchain named back
    # explicitly — ~80 fewer packages for dpkg to unpack and configure, and no
    # silent growth the next time an upstream adds a Recommends.
    #
    # The catch, and why base_packages now names build-essential and python3-dev:
    # gcc/g++/make/libc6-dev reach this image ONLY as recommends of golang and
    # the JDK. Turning recommends off without naming them removes the C toolchain
    # — which breaks node-gyp (so any npm/npx package with a native module), cgo
    # (go build defaults to CGO_ENABLED=1), and pip packages with C extensions.
    # A missing compiler fails far from here and reads as "npm is broken", so the
    # two settings are one change: do not flip this without checking that list.
    install_recommends: false
  when: provision_phase | default('full') != 'finalize'

# `limactl shell` (and ssh) forward COLORTERM from the host when present, but
# Debian's sshd only accepts LANG/LC_* by default, so truecolor terminals
# (iTerm2, WezTerm, kitty, Ghostty, …) get downgraded to 256-color inside the
# VM. Accepting COLORTERM restores 24-bit color for Claude Code's UI. This
# forwards the host's actual capability — terminals that don't set COLORTERM
# (e.g. Terminal.app) are unaffected.
- name: Accept COLORTERM over SSH for truecolor terminals
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/10-colorterm.conf
    content: "AcceptEnv COLORTERM\n"
    owner: root
    group: root
    mode: "0644"
  notify: Reload sshd
  when: provision_phase | default('full') != 'finalize'

# Mirror the write guard exactly (`!= 'finalize'`, i.e. both 'base' and 'full').
# Gating the removal on `== 'base'` alone left force-unsafe-io installed forever
# on a host provisioned directly with `ansible-playbook -i inventory site.yml`,
# which runs in the 'full' phase — that host writes the drop-in but never removed
# it, so every later apt run on a long-lived machine ran dpkg without fsync.
- name: Restore safe dpkg IO before this image is used as a clone source
  ansible.builtin.file:
    path: /etc/dpkg/dpkg.cfg.d/99-sand-base-speed
    state: absent
  when: provision_phase | default('full') != 'finalize'
