---
# The bulk of this role is heavy, identity-free account setup that belongs in
# the base image (skipped in the finalize phase). The exceptions are the
# home-directory lookup, which both phases need, and ~/.gitconfig, which carries
# the per-clone git identity and so runs in finalize (and the single-pass full).
- name: Generate a secure random password
  ansible.builtin.set_fact:
    user_password: "{{ lookup('ansible.builtin.password', '/dev/null', chars=['ascii_letters', 'digits', 'punctuation'], length=24) }}"
  when: provision_phase | default('full') != 'finalize'

- name: Create user {{ user_name }}
  ansible.builtin.user:
    name: "{{ user_name }}"
    shell: "{{ user_shell }}"
    create_home: true
    groups: sudo
    append: true
    password: "{{ user_password | password_hash('sha512') }}"
  when: provision_phase | default('full') != 'finalize'

# Without linger, logind stops user@<uid>.service ten seconds after the user's
# last login session goes away, which tears down any detached tmux server — and
# with it a long-running Claude Code session. That is easy to miss because an
# overlapping shell usually keeps the user manager alive; it only fires when
# every connection drains at once, and it is logged as a clean shutdown rather
# than an error. Linger keeps the user manager running with no sessions open, so
# detached work survives disconnecting.
- name: Enable systemd linger for {{ user_name }} so detached tmux survives logout
  ansible.builtin.command:
    cmd: loginctl enable-linger {{ user_name }}
  args:
    creates: /var/lib/systemd/linger/{{ user_name }}
  when: provision_phase | default('full') != 'finalize'

- name: Get home directory for {{ user_name }}
  ansible.builtin.getent:
    database: passwd
    key: "{{ user_name }}"

- name: Set user home directory fact
  ansible.builtin.set_fact:
    user_home: "{{ ansible_facts.getent_passwd[user_name][4] }}"

- name: Deploy sudoers file for passwordless sudo
  ansible.builtin.copy:
    content: "%sudo ALL=(ALL:ALL) NOPASSWD: ALL\n"
    dest: /etc/sudoers.d/nopasswd-sudo
    mode: "0440"
    validate: "visudo -cf %s"
  when: provision_phase | default('full') != 'finalize'

- name: Ensure ~/.ssh directory exists
  ansible.builtin.file:
    path: "{{ user_home }}/.ssh"
    state: directory
    mode: "0700"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
  when: provision_phase | default('full') != 'finalize'

# Optional: only for non-Lima / remote-host deployments that SSH in as the
# user. Lima injects its own key for `limactl shell`, so user_github_keys_url
# is left empty by default and this task is skipped.
- name: Fetch SSH authorized_keys from a URL
  ansible.builtin.get_url:
    url: "{{ user_github_keys_url }}"
    dest: "/tmp/{{ user_name }}-github-keys"
    mode: "0600"
  when:
    - user_github_keys_url | length > 0
    - provision_phase | default('full') != 'finalize'

# Read the fetched file into a variable rather than reaching for it from the
# loop. Ansible templates a task's `loop` BEFORE it evaluates the task's `when`,
# so a file lookup in the loop expression runs even in the finalize phase — where
# the fetch above is skipped and the file does not exist — and the whole play
# dies with "could not locate file in lookup". Keying the loop off `is defined`
# short-circuits instead: when the slurp is skipped, there is nothing to iterate.
- name: Read the fetched authorized_keys
  ansible.builtin.slurp:
    src: "/tmp/{{ user_name }}-github-keys"
  register: _github_keys
  when:
    - user_github_keys_url | length > 0
    - provision_phase | default('full') != 'finalize'

# File mode and ownership are load-bearing: sshd ignores authorized_keys that
# is group/world-writable or not owned by the user.
- name: Install fetched authorized_keys
  ansible.builtin.lineinfile:
    path: "{{ user_home }}/.ssh/authorized_keys"
    line: "{{ item }}"
    create: true
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0600"
  loop: "{{ (_github_keys.content | b64decode).splitlines() if (_github_keys.content is defined) else [] }}"
  when: _github_keys.content is defined

- name: Remove temporary GitHub keys file
  ansible.builtin.file:
    path: "/tmp/{{ user_name }}-github-keys"
    state: absent
  when:
    - user_github_keys_url | length > 0
    - provision_phase | default('full') != 'finalize'

- name: Deploy ~/.ssh/rc
  ansible.builtin.template:
    src: ssh_rc.j2
    dest: "{{ user_home }}/.ssh/rc"
    mode: "0755"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
  when: provision_phase | default('full') != 'finalize'

- name: Deploy ~/.tmux.conf
  ansible.builtin.template:
    src: tmux.conf.j2
    dest: "{{ user_home }}/.tmux.conf"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"
  when: provision_phase | default('full') != 'finalize'

- name: Deploy ~/.gitconfig
  ansible.builtin.template:
    src: gitconfig.j2
    dest: "{{ user_home }}/.gitconfig"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"
  when: provision_phase | default('full') != 'base'

- name: Ensure ~/.local/bin directory exists
  ansible.builtin.file:
    path: "{{ user_home }}/.local/bin"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"
  when: provision_phase | default('full') != 'finalize'

- name: Ensure ~/.config/direnv directory exists
  ansible.builtin.file:
    path: "{{ user_home }}/.config/direnv"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"
  when: provision_phase | default('full') != 'finalize'

- name: Deploy ~/.config/direnv/direnv.toml
  ansible.builtin.copy:
    content: |
      [global]
      load_dotenv = true
    dest: "{{ user_home }}/.config/direnv/direnv.toml"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"
  when: provision_phase | default('full') != 'finalize'

- name: Ensure ~/.config/sandbar directory exists
  ansible.builtin.file:
    path: "{{ user_home }}/.config/sandbar"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0700"
  when: provision_phase | default('full') != 'finalize'

- name: Deploy bashrc customizations
  ansible.builtin.blockinfile:
    path: "{{ user_home }}/.bashrc"
    marker: "# {mark} ANSIBLE MANAGED BLOCK"
    block: |
      export PATH="$HOME/.local/bin:$PATH"
      export IS_SANDBOX=1
      # Launch Claude Code with bypass permissions, but sign in first when
      # needed: seeding hasCompletedOnboarding makes the first REPL start in
      # bypass mode, at the cost of the onboarding wizard's login step — so an
      # un-authed first run would otherwise drop straight to the prompt with
      # "Not logged in". This runs `claude auth login` (full-scope interactive
      # OAuth) when logged out, then launches. Real subcommands (auth, mcp,
      # doctor, update, ...) pass through untouched.
      claude() {
        case "$1" in
          agents|auth|auto-mode|config|doctor|gateway|install|mcp|plugin|plugins|project|setup-token|ultrareview|update|upgrade)
            command claude "$@"; return $? ;;
        esac
        # One-time heads-up. Claude Code doesn't always land in bypass mode on
        # the session right after you sign in (and toggling its full-screen
        # renderer restarts into manual mode once) — a quick quit-and-relaunch
        # settles it. That timing is a moving target upstream, so rather than
        # chase it we tell the user once, then record a flag so it never shows
        # again. Skipped when non-interactive (no tty) so `-p` never blocks.
        sand_notice="$HOME/.config/sandbar/.claude-first-run-notice"
        if [ ! -f "$sand_notice" ] && [ -t 0 ]; then
          echo ""
          echo "  ⚠ Heads up: the first time you sign in to Claude Code,"
          echo "  --dangerously-skip-permissions and /remote-control may not be"
          echo "  active yet — and Claude may prompt once about its full-screen"
          echo "  renderer. If you land in manual mode, just quit ('/exit' or"
          echo "  Ctrl+C twice) and run 'claude' again. You'll only see this once."
          echo ""
          printf "  Press Enter to continue… "
          read -r sand_reply
          mkdir -p "$(dirname "$sand_notice")" && : > "$sand_notice"
        fi
        if ! command claude auth status >/dev/null 2>&1; then
          echo "Not signed in to Claude Code — starting sign-in…"
          command claude auth login || return $?
        fi
        command claude --dangerously-skip-permissions "$@"
      }
      export VISUAL=vim
      export EDITOR=vim
      eval "$(direnv hook bash)"
      # Secrets are written by `sand` on VM start; the file is absent until then.
      if [ -f "$HOME/.config/sandbar/secrets.env" ]; then
        . "$HOME/.config/sandbar/secrets.env"
      fi
  when: provision_phase | default('full') != 'finalize'

- name: Source the sandbar secrets file from ~/.profile (login shells)
  ansible.builtin.blockinfile:
    path: "{{ user_home }}/.profile"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - sandbar secrets"
    create: true
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0644"
    block: |
      # Secrets are written by `sand` on VM start; the file is absent until then.
      if [ -f "$HOME/.config/sandbar/secrets.env" ]; then
        . "$HOME/.config/sandbar/secrets.env"
      fi
  when: provision_phase | default('full') != 'finalize'

- name: Display generated password for {{ user_name }}
  ansible.builtin.debug:
    msg: >-
      Password for user '{{ user_name }}': {{ user_password }}
      (use for SSH and Samba access)
  when: provision_phase | default('full') != 'finalize'

