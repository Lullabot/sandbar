---
- name: Get home directory for {{ devtools_user_name }}
  ansible.builtin.getent:
    database: passwd
    key: "{{ devtools_user_name }}"

- name: Set devtools user home directory fact
  ansible.builtin.set_fact:
    devtools_user_home: "{{ ansible_facts.getent_passwd[devtools_user_name][4] }}"

# Docker CE, ddev, cloudflared, and gh are all registered (keyrings + apt
# sources) and installed in roles/base/tasks/main.yml as part of the single
# consolidated apt transaction for the base phase — see the "Register every
# third-party apt keyring and source" block there. This role only owns the
# non-apt setup for those tools below (service enablement, group membership,
# non-apt installs, proxy config).

# Docker is SOCKET-activated, not started at boot. docker.service is ~2-4.5s and
# it sits on the boot critical path: it gates multi-user.target, which gates
# cloud-final (Lima's per-boot script), which is what `limactl start` waits for.
# Nothing needs the daemon DURING boot — the first client to touch
# /var/run/docker.sock (a docker command, ddev, the Docker SDK) starts it — so
# every VM was paying for it on every boot to have it ready a few seconds sooner.
#
# docker.socket is enabled and docker.service is explicitly NOT: leaving the
# service enabled would start it at boot anyway and make the socket unit
# pointless. The daemon still restarts on its own after a crash (Restart=always
# in its unit), and once started it stays up.
#
# Consequence to know about: `systemctl is-active docker` reads "inactive" on a
# freshly booted VM until something opens the socket. `docker info` works — it
# opens the socket, which is the trigger.
- name: Enable the Docker socket (activates the daemon on first use)
  ansible.builtin.systemd_service:
    name: docker.socket
    state: started
    enabled: true

- name: Keep the Docker service off the boot path
  ansible.builtin.systemd_service:
    name: docker.service
    enabled: false

- name: Add claude user to docker group
  ansible.builtin.user:
    name: "{{ devtools_user_name }}"
    groups: docker
    append: true

# GitLab CLI (glab)
- name: Resolve glab .deb architecture
  ansible.builtin.set_fact:
    devtools_glab_deb_arch: "{{ devtools_glab_deb_arch_map[ansible_architecture] | default('') }}"

- name: Fail on unsupported architecture for glab
  ansible.builtin.fail:
    msg: "Unsupported architecture '{{ ansible_architecture }}' for the glab .deb package"
  when: devtools_glab_deb_arch == ''

- name: Download GitLab CLI (glab) .deb package
  ansible.builtin.get_url:
    url: "https://gitlab.com/gitlab-org/cli/-/releases/v{{ devtools_glab_version }}/downloads/glab_{{ devtools_glab_version }}_linux_{{ devtools_glab_deb_arch }}.deb"
    dest: "/tmp/glab_{{ devtools_glab_version }}_linux_{{ devtools_glab_deb_arch }}.deb"
    mode: "0644"

- name: Install GitLab CLI (glab)
  ansible.builtin.apt:
    deb: "/tmp/glab_{{ devtools_glab_version }}_linux_{{ devtools_glab_deb_arch }}.deb"
    state: present

# Drupal.org CLI (drupalorg). Its PHP runtime (php-cli, php-curl) is named in
# devtools_packages and installed by the single consolidated base-phase apt
# transaction in roles/base/tasks/main.yml; this role only drops the PHAR on
# PATH — a non-apt install, like uv above.
- name: Install Drupal.org CLI (drupalorg)
  ansible.builtin.get_url:
    url: "https://github.com/mglaman/drupalorg-cli/releases/download/{{ devtools_drupalorg_cli_version }}/drupalorg.phar"
    dest: /usr/local/bin/drupalorg
    owner: root
    group: root
    mode: "0755"

# uv
- name: Install uv
  ansible.builtin.shell:
    cmd: set -o pipefail && curl -LsSf https://astral.sh/uv/install.sh | sh
    executable: /bin/bash
  become: true
  become_user: "{{ devtools_user_name }}"
  args:
    creates: "{{ devtools_user_home }}/.local/bin/uv"

# mkcert CA
- name: Install mkcert CA
  ansible.builtin.command:
    cmd: mkcert -install
  become: true
  become_user: "{{ devtools_user_name }}"
  args:
    creates: "{{ devtools_user_home }}/.local/share/mkcert/rootCA.pem"

# Docker Registry Proxy
- name: Download Docker registry proxy CA certificate
  ansible.builtin.get_url:
    url: "http://{{ devtools_docker_registry_proxy_host }}:{{ devtools_docker_registry_proxy_port }}/ca.crt"
    dest: /usr/local/share/ca-certificates/docker_registry_proxy.crt
    mode: "0644"
  notify: Update CA certificates
  when: devtools_docker_registry_proxy_enabled

- name: Ensure Docker systemd override directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/docker.service.d/
    state: directory
    mode: "0755"
  when: devtools_docker_registry_proxy_enabled

- name: Deploy Docker proxy configuration
  ansible.builtin.template:
    src: docker-proxy.conf.j2
    dest: /etc/systemd/system/docker.service.d/http-proxy.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd
  when: devtools_docker_registry_proxy_enabled
