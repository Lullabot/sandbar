---
# Renders secrets (passed in as Ansible vars over stdin, never argv) into the
# VM. This role is finalize/full-phase only — secrets never belong on the
# base image (see site.yml's role-level `when:`), so no provision_phase
# guards are needed within this file.
- name: Get home directory for {{ user_name }}
  ansible.builtin.getent:
    database: passwd
    key: "{{ user_name }}"

- name: Set user home directory fact
  ansible.builtin.set_fact:
    user_home: "{{ ansible_facts.getent_passwd[user_name][4] }}"

- name: Ensure ~/.config/sandbar directory exists
  ansible.builtin.file:
    path: "{{ user_home }}/.config/sandbar"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"

# ---------------------------------------------------------------------------
# secrets_global -> ~/.config/sandbar/secrets.env, sourced from bashrc
# ---------------------------------------------------------------------------
- name: Render VM-global secrets
  when: secrets_global | default([]) | length > 0
  block:
    - name: Write ~/.config/sandbar/secrets.env
      ansible.builtin.copy:
        dest: "{{ user_home }}/.config/sandbar/secrets.env"
        content: |
          {% for item in secrets_global %}
          export {{ item.name }}={{ item.value | quote }}
          {% endfor %}
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: "0600"
      no_log: true

    - name: Ensure secrets.env is sourced from bashrc
      ansible.builtin.blockinfile:
        path: "{{ user_home }}/.bashrc"
        marker: "# {mark} ANSIBLE MANAGED BLOCK: sandbar-secrets"
        block: |
          [ -f ~/.config/sandbar/secrets.env ] && . ~/.config/sandbar/secrets.env

# ---------------------------------------------------------------------------
# secrets_github -> file-backed git credential store + includeIf overrides
# ---------------------------------------------------------------------------
- name: Render GitHub credential secrets
  when: secrets_github | default([]) | length > 0
  block:
    - name: Ensure git credential/config directories exist
      ansible.builtin.file:
        path: "{{ user_home }}/.config/sandbar/{{ item }}"
        state: directory
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: "{{ '0700' if item == 'git-credentials' else '0755' }}"
      loop:
        - git-credentials
        - gitconfig.d

    - name: Reset scope-slug accumulator
      ansible.builtin.set_fact:
        _secrets_github_with_slug: []

    # scope "" (VM-wide default) slugs to "default"; a non-empty scope (e.g.
    # "github.com/acme") slugs to "github-com-acme" for use in filenames.
    - name: Compute per-item scope slugs
      ansible.builtin.set_fact:
        _secrets_github_with_slug: >-
          {{ (_secrets_github_with_slug | default([])) +
             [item | combine({'slug': ('default' if (item.scope | default('')) | length == 0
                                        else (item.scope | regex_replace('[^A-Za-z0-9]+', '-')))})] }}
      loop: "{{ secrets_github }}"
      loop_control:
        label: "{{ item.scope | default('(default)') }}"
      no_log: true

    - name: Write per-scope git credential files
      ansible.builtin.copy:
        dest: "{{ user_home }}/.config/sandbar/git-credentials/{{ item.slug }}"
        content: "https://x-access-token:{{ item.token }}@github.com\n"
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: "0600"
      loop: "{{ _secrets_github_with_slug }}"
      loop_control:
        label: "{{ item.scope | default('(default)') }}"
      no_log: true

    # NOTE: credential.helper's `--file=` argument is a plain shell argument,
    # not a git config path value, so git does NOT tilde-expand it (unlike
    # `includeIf`'s `gitdir:`/`path =`, which do) -- confirmed empirically
    # that `store --file=~/...` silently resolves to nothing. Use the
    # absolute user_home path here.
    - name: Write scoped gitconfig include files
      ansible.builtin.copy:
        dest: "{{ user_home }}/.config/sandbar/gitconfig.d/{{ item.slug }}"
        content: |
          [credential]
          	helper = store --file={{ user_home }}/.config/sandbar/git-credentials/{{ item.slug }}
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: "0644"
      loop: "{{ _secrets_github_with_slug }}"
      loop_control:
        label: "{{ item.scope | default('(default)') }}"
      when: (item.scope | default('')) | length > 0
      # This task's own content doesn't render item.token, but item (the
      # whole loop var, token included) is echoed verbatim into the task
      # result/"item" field in verbose output regardless -- no_log required.
      no_log: true

    - name: Wire GitHub credential helper(s) into ~/.gitconfig
      ansible.builtin.blockinfile:
        path: "{{ user_home }}/.gitconfig"
        marker: "# {mark} ANSIBLE MANAGED BLOCK: sandbar-github-secrets"
        block: "{{ lookup('ansible.builtin.template', 'gitconfig_secrets.j2') }}"

    # Best-effort only: refreshes gh's own file-backed store (hosts.yml) for
    # the VM-wide default token so `gh` CLI benefits too. gh only supports one
    # credential per host, so this only applies to the empty-scope entry.
    # Never fails the play (gh may not be installed, or auth may fail).
    - name: Best-effort refresh of gh CLI's file-backed auth (default scope only)
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          if command -v gh >/dev/null 2>&1; then
            echo {{ item.token | quote }} | gh auth login --hostname github.com --with-token
          fi
        executable: /bin/bash
      become: true
      become_user: "{{ user_name }}"
      environment:
        HOME: "{{ user_home }}"
      loop: "{{ secrets_github }}"
      loop_control:
        label: "{{ item.scope | default('(default)') }}"
      when: (item.scope | default('')) | length == 0
      changed_when: true
      failed_when: false
      no_log: true

# ---------------------------------------------------------------------------
# secrets_dir_env -> ~/<scope>/.env, approved with direnv (no manual step)
# ---------------------------------------------------------------------------
- name: Render per-directory env secrets
  when: secrets_dir_env | default([]) | length > 0
  block:
    - name: Collect distinct secrets_dir_env scopes
      ansible.builtin.set_fact:
        _secrets_dir_env_scopes: "{{ secrets_dir_env | map(attribute='scope') | unique | list }}"

    - name: Ensure per-scope directories exist
      ansible.builtin.file:
        path: "{{ user_home }}/{{ item }}"
        state: directory
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: "0755"
      loop: "{{ _secrets_dir_env_scopes }}"

    - name: Write per-scope .env files
      ansible.builtin.copy:
        dest: "{{ user_home }}/{{ item }}/.env"
        content: |
          {% for entry in secrets_dir_env | selectattr('scope', 'equalto', item) %}
          {{ entry.name }}={{ entry.value }}
          {% endfor %}
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: "0600"
      loop: "{{ _secrets_dir_env_scopes }}"
      no_log: true

    - name: Approve per-scope .env files with direnv
      ansible.builtin.command:
        cmd: direnv allow {{ user_home }}/{{ item }}
      become: true
      become_user: "{{ user_name }}"
      environment:
        HOME: "{{ user_home }}"
      changed_when: true
      loop: "{{ _secrets_dir_env_scopes }}"
