---
# Renders secrets (passed in as Ansible vars over stdin, never argv) into the
# VM. This role is finalize/full-phase only — secrets never belong on the
# base image (see site.yml's role-level `when:`), so no provision_phase
# guards are needed within this file.
- name: Get home directory for {{ user_name }}
  ansible.builtin.getent:
    database: passwd
    key: "{{ user_name }}"

- name: Set user home directory fact
  ansible.builtin.set_fact:
    user_home: "{{ ansible_facts.getent_passwd[user_name][4] }}"

- name: Ensure ~/.config/sandbar directory exists
  ansible.builtin.file:
    path: "{{ user_home }}/.config/sandbar"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"

# ---------------------------------------------------------------------------
# secrets_global -> ~/.config/sandbar/secrets.env, sourced from ~/.profile
# ---------------------------------------------------------------------------
# Runs UNCONDITIONALLY (no length>0 guard) so a removal is reconciled: when the
# last global secret is deleted, secrets.env is rewritten to empty rather than
# left holding a stale value. Sourcing an empty file is a harmless no-op.
- name: Render VM-global secrets
  block:
    # A static header keeps the rendered content non-empty even when there are
    # zero global secrets — Ansible's copy module rejects empty `content` with
    # "src (or content) is required", which is exactly the purge-to-empty case
    # this unconditional task must handle.
    - name: Write ~/.config/sandbar/secrets.env
      ansible.builtin.copy:
        dest: "{{ user_home }}/.config/sandbar/secrets.env"
        content: |
          # Managed by the sandbar secrets role — VM-global environment secrets.
          # Edit via `sand secret set` / `sand secret rm`, not by hand.
          {% for item in secrets_global | default([]) %}
          export {{ item.name }}={{ item.value | quote }}
          {% endfor %}
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: "0600"
      no_log: true

    # Source secrets.env from BOTH ~/.profile and ~/.bashrc so every shell the
    # user can land in sees the vars — there is no single file that covers them
    # all:
    #   - ~/.profile is read by LOGIN shells regardless of interactivity, so it
    #     covers `bash -lc`, ssh commands, and scripts. Debian's ~/.bashrc
    #     returns early for non-interactive shells (`case $- in *i*) ;;
    #     *) return;;`), so a source line there alone would be invisible to
    #     those — hence .profile is required.
    #   - ~/.bashrc is read by INTERACTIVE non-login shells (a `limactl shell`
    #     session that isn't a login shell, a new terminal tab), which do NOT
    #     read ~/.profile — hence .bashrc is required too.
    # A login+interactive shell reads both (via .profile -> .bashrc); re-sourcing
    # the same file just re-exports identical values, which is harmless.
    - name: Ensure secrets.env is sourced from login and interactive shells
      ansible.builtin.blockinfile:
        path: "{{ user_home }}/{{ item }}"
        create: true
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: "0644"
        marker: "# {mark} ANSIBLE MANAGED BLOCK: sandbar-secrets"
        block: |
          [ -f ~/.config/sandbar/secrets.env ] && . ~/.config/sandbar/secrets.env
      loop:
        - .profile
        - .bashrc

# ---------------------------------------------------------------------------
# secrets_github -> file-backed git credential store + includeIf overrides
# ---------------------------------------------------------------------------
# Runs UNCONDITIONALLY so removals reconcile: stale per-scope credential/include
# files for scopes no longer present are pruned, and the ~/.gitconfig managed
# block is regenerated from the current list (empty -> the block is removed, so
# git stops using any deleted token). When secrets_github is empty every write
# loop is a no-op and only the pruning + block-clear run.
- name: Render GitHub credential secrets
  block:
    - name: Ensure git credential/config directories exist
      ansible.builtin.file:
        path: "{{ user_home }}/.config/sandbar/{{ item }}"
        state: directory
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: "{{ '0700' if item == 'git-credentials' else '0755' }}"
      loop:
        - git-credentials
        - gitconfig.d

    - name: Reset scope-slug accumulator
      ansible.builtin.set_fact:
        _secrets_github_with_slug: []

    # scope "" (VM-wide default) slugs to "default"; a non-empty scope (e.g.
    # "github.com/acme") slugs to "github-com-acme" for use in filenames.
    - name: Compute per-item scope slugs
      ansible.builtin.set_fact:
        _secrets_github_with_slug: >-
          {{ (_secrets_github_with_slug | default([])) +
             [item | combine({'slug': ('default' if (item.scope | default('')) | length == 0
                                        else (item.scope | regex_replace('[^A-Za-z0-9]+', '-')))})] }}
      loop: "{{ secrets_github | default([]) }}"
      loop_control:
        label: "{{ item.scope | default('(default)') }}"
      no_log: true

    # Reconcile removals: the desired on-disk files are exactly the slugs of the
    # current secrets; any other file under git-credentials/ or gitconfig.d/ is
    # from a deleted scope and must be pruned so a removed token does not linger
    # on disk.
    - name: Compute desired credential slugs
      ansible.builtin.set_fact:
        _desired_github_slugs: "{{ _secrets_github_with_slug | map(attribute='slug') | list }}"

    - name: Find existing per-scope credential/include files
      ansible.builtin.find:
        paths:
          - "{{ user_home }}/.config/sandbar/git-credentials"
          - "{{ user_home }}/.config/sandbar/gitconfig.d"
        file_type: file
      register: _existing_github_files

    - name: Prune credential/include files for removed scopes
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ _existing_github_files.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      when: (item.path | basename) not in _desired_github_slugs

    - name: Write per-scope git credential files
      ansible.builtin.copy:
        dest: "{{ user_home }}/.config/sandbar/git-credentials/{{ item.slug }}"
        content: "https://x-access-token:{{ item.token }}@github.com\n"
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: "0600"
      loop: "{{ _secrets_github_with_slug }}"
      loop_control:
        label: "{{ item.scope | default('(default)') }}"
      no_log: true

    # NOTE: credential.helper's `--file=` argument is a plain shell argument,
    # not a git config path value, so git does NOT tilde-expand it (unlike
    # `includeIf`'s `gitdir:`/`path =`, which do) -- confirmed empirically
    # that `store --file=~/...` silently resolves to nothing. Use the
    # absolute user_home path here.
    - name: Write scoped gitconfig include files
      ansible.builtin.copy:
        dest: "{{ user_home }}/.config/sandbar/gitconfig.d/{{ item.slug }}"
        content: |
          [credential]
          	helper = store --file={{ user_home }}/.config/sandbar/git-credentials/{{ item.slug }}
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: "0644"
      loop: "{{ _secrets_github_with_slug }}"
      loop_control:
        label: "{{ item.scope | default('(default)') }}"
      when: (item.scope | default('')) | length > 0
      # This task's own content doesn't render item.token, but item (the
      # whole loop var, token included) is echoed verbatim into the task
      # result/"item" field in verbose output regardless -- no_log required.
      no_log: true

    - name: Wire GitHub credential helper(s) into ~/.gitconfig
      ansible.builtin.blockinfile:
        path: "{{ user_home }}/.gitconfig"
        marker: "# {mark} ANSIBLE MANAGED BLOCK: sandbar-github-secrets"
        block: "{{ lookup('ansible.builtin.template', 'gitconfig_secrets.j2') }}"

    # Best-effort only: refreshes gh's own file-backed store (hosts.yml) for
    # the VM-wide default token so `gh` CLI benefits too. gh only supports one
    # credential per host, so this only applies to the empty-scope entry.
    # Never fails the play (gh may not be installed, or auth may fail).
    - name: Best-effort refresh of gh CLI's file-backed auth (default scope only)
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          if command -v gh >/dev/null 2>&1; then
            echo {{ item.token | quote }} | gh auth login --hostname github.com --with-token
          fi
        executable: /bin/bash
      become: true
      become_user: "{{ user_name }}"
      environment:
        HOME: "{{ user_home }}"
      loop: "{{ secrets_github }}"
      loop_control:
        label: "{{ item.scope | default('(default)') }}"
      when: (item.scope | default('')) | length == 0
      changed_when: true
      failed_when: false
      no_log: true

# ---------------------------------------------------------------------------
# secrets_dir_env -> ~/<scope>/.env, approved with direnv (no manual step)
# ---------------------------------------------------------------------------
- name: Render per-directory env secrets
  when: secrets_dir_env | default([]) | length > 0
  block:
    - name: Collect distinct secrets_dir_env scopes
      ansible.builtin.set_fact:
        _secrets_dir_env_scopes: "{{ secrets_dir_env | map(attribute='scope') | unique | list }}"

    - name: Ensure per-scope directories exist
      ansible.builtin.file:
        path: "{{ user_home }}/{{ item }}"
        state: directory
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: "0755"
      loop: "{{ _secrets_dir_env_scopes }}"

    - name: Write per-scope .env files
      ansible.builtin.copy:
        dest: "{{ user_home }}/{{ item }}/.env"
        content: |
          {% for entry in secrets_dir_env | selectattr('scope', 'equalto', item) %}
          {{ entry.name }}={{ entry.value }}
          {% endfor %}
        owner: "{{ user_name }}"
        group: "{{ user_name }}"
        mode: "0600"
      loop: "{{ _secrets_dir_env_scopes }}"
      no_log: true

    - name: Approve per-scope .env files with direnv
      ansible.builtin.command:
        cmd: direnv allow {{ user_home }}/{{ item }}
      become: true
      become_user: "{{ user_name }}"
      environment:
        HOME: "{{ user_home }}"
      changed_when: true
      loop: "{{ _secrets_dir_env_scopes }}"
