---
# Ansible var contract for roles/secrets. Every list defaults to empty so the
# role is a safe no-op when no secrets are supplied (e.g. on the base image).
#
# secrets_global: VM-wide environment variables rendered into
#   ~/.config/sandbar/secrets.env and sourced from the user's bashrc.
#   - { name: "NAME", value: "value" }
secrets_global: []

# secrets_github: file-backed git credential store entries, selected per
# checkout subtree via a git `includeIf "gitdir:..."` block so rotation is
# live (no shell restart needed). scope: "" means the VM-wide default;
# scope: "github.com/acme" overrides only checkouts under ~/github.com/acme/.
#   - { scope: "", token: "..." }
#   - { scope: "github.com/acme", token: "..." }
secrets_github: []

# secrets_dir_env: per-directory .env files loaded automatically by direnv
# (the user never runs `direnv allow` themselves).
#   - { scope: "github.com/acme", name: "NAME", value: "value" }
secrets_dir_env: []
