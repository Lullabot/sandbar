---
# Stage two things on the container before Converge runs the repo-profile
# role (roles/repo-profile/tasks/main.yml, strikethroo plan 18 task 03)
# against a fake "cloned checkout" instead of a real git clone:
#
#  1. A copy of THIS repo's real scripts/ and shipped-profiles/ trees, landed
#     at {{ playbook_dir }} on BOTH the container and the controller.
#     roles/repo-profile hard-codes paths off `playbook_dir`
#     (scripts/validate_profile.py invoked via `command`, and each shipped
#     tool's profile.yml under shipped-profiles/<tool>/ loaded via
#     `include_vars`) because in production that variable is the directory
#     the whole embedded playbook fileset was rsynced into alongside
#     site.yml, INSIDE the guest, where ansible-playbook itself runs
#     (--connection=local) — controller and target are the same machine
#     there. Under molecule's docker driver they are NOT: `command` runs on
#     the remote target (the container), but `include_vars` is a
#     controller-side action that reads from wherever ansible-playbook
#     itself runs (the outer GitHub Actions host). Confirmed against two
#     separate real CI failures ("Could not find or access ... on the
#     Ansible Controller") — first for the checkout's own .sandbar/
#     manifest (see the note on the checkout copy below), then again here
#     for shipped-profiles/<tool>/profile.yml once that first one was
#     fixed — so both copies need both destinations.
#
#  2. A fake "cloned checkout" under /tmp/repo-profile-checkout, containing
#     the committed-style .sandbar/ manifest fixture-checkout/.sandbar/
#     (this scenario's own fixture, checked into the repo) that exercises
#     all five declaration groups. converge.yml points
#     repo_profile_checkout_dir at this directory instead of a real clone
#     (see roles/repo-profile/defaults/main.yml's comment on why that
#     variable is deliberately overridable for exactly this purpose).
#
#     This checkout must exist in BOTH places, not just the container:
#     roles/repo-profile's `stat`/`command` tasks run on the remote target
#     (the container) as normal, but its `include_vars` task (loading the
#     manifest into the `repo_profile` var) is a CONTROLLER-side action —
#     it reads from the machine running `ansible-playbook` itself, not the
#     managed node. In production this distinction never surfaces because
#     finalize runs `--connection=local` INSIDE the guest, so controller and
#     target are the same machine; molecule's docker driver runs
#     ansible-playbook on the OUTER host against the container over a
#     docker connection, splitting them. Confirmed against a real CI
#     failure ("Could not find or access '/tmp/repo-profile-checkout/
#     .sandbar/profile.yml' on the Ansible Controller") once the earlier
#     role-path bug was fixed and this became the next thing to break.
- name: Prepare
  hosts: all
  become: true
  tasks:
    - name: Stage the real scripts/ and shipped-profiles/ trees at playbook_dir (container)
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../{{ item }}"
        dest: "{{ playbook_dir }}/"
      loop:
        - scripts
        - shipped-profiles

    - name: Also stage scripts/ and shipped-profiles/ on the controller (for include_vars)
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../{{ item }}"
        dest: "{{ playbook_dir }}/"
      loop:
        - scripts
        - shipped-profiles
      delegate_to: localhost
      run_once: true

    - name: Stage the fake cloned checkout's .sandbar/ manifest (container)
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/fixture-checkout/.sandbar"
        dest: /tmp/repo-profile-checkout/

    - name: Also stage the fake checkout on the controller (for include_vars)
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/fixture-checkout/.sandbar"
        dest: /tmp/repo-profile-checkout/
      delegate_to: localhost
      run_once: true
