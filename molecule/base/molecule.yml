---
# Systemd-enabled Debian 13 (trixie) image matching the project's Debian
# target (README.md: "Ansible playbook to provision a Debian 13 (trixie) VM").
# /sbin/init as PID 1 + privileged + the host cgroup mount let systemd units
# (sshd reload, etc.) actually start under converge, the way they do on the
# real Lima VM.
driver:
  name: docker
platforms:
  - name: base-instance
    # Pinned by digest for reproducibility (the image publishes only a floating
    # `latest` tag). Renovate keeps the digest current via the customManager in
    # renovate.json; don't hand-edit the sha without updating molecule/samba too.
    image: "geerlingguy/docker-debian13-ansible:latest@sha256:9b433580e02f960ea57525e0bcfe13d7cb32188f9ebc1952f21b9dfa19d8bd47"
    command: /sbin/init
    privileged: true
    pre_build_image: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
provisioner:
  name: ansible
  playbook:
    prepare: prepare.yml
    converge: converge.yml
    verify: verify.yml
  inventory:
    host_vars:
      base-instance:
        # Never pay for the 30-day self-refresh apt-upgrade in a scenario run;
        # it isn't part of what this scenario asserts and just adds runtime.
        base_apt_upgrade: false
verifier:
  name: ansible
scenario:
  # Explicit for readability; this matches molecule's own default sequence.
  # `idempotence` re-runs converge.yml and fails the job if anything reports
  # changed the second time.
  test_sequence:
    - dependency
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
