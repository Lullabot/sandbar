---
# Same systemd-enabled Debian 13 (trixie) image as molecule/base — matches
# the project's Debian target (README.md) so smbd actually starts under
# systemd during converge.
driver:
  name: docker
platforms:
  - name: samba-instance
    image: "geerlingguy/docker-debian13-ansible:latest"
    command: /sbin/init
    privileged: true
    pre_build_image: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
provisioner:
  name: ansible
  playbook:
    converge: converge.yml
    verify: verify.yml
verifier:
  name: ansible
scenario:
  # NOTE on idempotence: roles/samba/tasks/main.yml's "Set Samba password
  # for {{ samba_user }}" task is `changed_when: true` unconditionally (it
  # shells out to smbpasswd with no idempotent check available), so a
  # second converge will always report that one task as changed. That is a
  # property of the production role, not this test asset, and is out of
  # scope for a test-only task to change. `idempotence` is left in the
  # default sequence below so this is visible in CI rather than hidden;
  # expect molecule test -s samba to fail the idempotence stage on that one
  # task until roles/samba is revisited.
  test_sequence:
    - dependency
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
