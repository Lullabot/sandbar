site_name: sandbar
site_url: https://lullabot.github.io/sandbar/
repo_url: https://github.com/lullabot/sandbar
site_description: Disposable Claude Code development VMs on Lima.
docs_dir: docs
site_dir: site

theme:
  name: material
  custom_dir: mkdocs-overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - content.code.copy

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/palette-sync.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra:
  version:
    provider: mike
    alias: true

nav:
  - Home: index.md
  - Getting Started:
    - About sand: getting-started/index.md
    - Installation: getting-started/installation.md
    - Your First VM: getting-started/first-vm.md
    - How Provisioning Works: getting-started/how-it-works.md
    - Available Tools: getting-started/available-tools.md
    - Security Model: reference/security-model.md
  - Using sand:
    - The Board (TUI): using-sand/tui.md
    - CLI Reference: using-sand/cli-reference.md
    - Secrets: using-sand/secrets.md
    - Shells and Files: using-sand/files-and-shells.md
    - Remote Lima Hosts: using-sand/remote-hosts.md
  - Reference:
    - Files and State: reference/files-and-state.md
    - Troubleshooting: reference/troubleshooting.md
  - Why Sandbar: why.md
  - Contributing:
    - Development: contributing/development.md
    - The Embedded Playbook: contributing/ansible-playbook.md
    - Releases: contributing/releases.md
